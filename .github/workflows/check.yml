name: check

on:
  # Auto-fire on:
  #   - every push to main (catches drift on direct merges + post-publish
  #     squash landings)
  #   - every <package>-v* tag push (last-chance type-check / lint / fmt
  #     gate before release.yml bundles + publishes — would have caught
  #     launcher-v0.2.0 shipping unrunnable due to a missing-sibling import)
  #   - every PR targeting main (inbound contribution surface)
  #   - workflow_dispatch (manual retry)
  #
  # Both jobs are repo-gated to PsycherosAI/Psycheros — on
  # PsycherosAI/Psycheros-staging the workflow run starts but every job
  # skips before any runner spins up (zero billable minutes). Staging
  # gates run locally before push instead (see the
  # psycheros-publication skill's pre-publish step).
  push:
    branches: [main]
    tags:
      - "launcher-v*"
      - "entity-core-v*"
      - "entity-loom-v*"
      - "psycheros-v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  workspace:
    name: type-check / lint / fmt
    if: github.repository == 'PsycherosAI/Psycheros'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version-file: .deno-version

      - name: Cache Deno deps
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/deno
            ~/.deno
          key: deno-${{ runner.os }}-${{ hashFiles('deno.lock', 'deno.json', 'packages/*/deno.json') }}
          restore-keys: |
            deno-${{ runner.os }}-

      - name: Type-check all packages
        run: |
          deno check \
            packages/entity-core/src/mod.ts \
            packages/entity-loom/src/main.ts \
            packages/psycheros/src/main.ts \
            packages/launcher/dashboard.ts

      - name: Lint all packages
        run: deno lint

      - name: Format check
        run: deno fmt --check

      - name: Run tests
        run: deno task test

  launcher-v2-macos:
    name: launcher-v2 cargo + smoke (macOS)
    if: github.repository == 'PsycherosAI/Psycheros'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Check if launcher-v2 changed
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            launcher-v2:
              - 'packages/launcher-v2/**'
              - '.deno-version'

      - name: Set up Rust
        if: steps.filter.outputs.launcher-v2 == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Set up Deno (for the backup_restore integration test + sidecar staging)
        if: steps.filter.outputs.launcher-v2 == 'true'
        uses: denoland/setup-deno@v2
        with:
          deno-version-file: .deno-version

      - name: Stage sidecar Deno + icons (setup.sh)
        if: steps.filter.outputs.launcher-v2 == 'true'
        # `cargo` won't build on a fresh checkout — tauri.conf.json
        # declares `binaries/deno` as an externalBin, so the build
        # script aborts unless `setup.sh` has staged the per-triple
        # sidecar copy + the placeholder RGBA icons. Mirrors the
        # release.yml job's equivalent step.
        working-directory: packages/launcher-v2
        run: ./scripts/setup.sh

      - name: cargo fmt --check
        if: steps.filter.outputs.launcher-v2 == 'true'
        working-directory: packages/launcher-v2/src-tauri
        run: cargo fmt --check

      - name: cargo clippy
        if: steps.filter.outputs.launcher-v2 == 'true'
        working-directory: packages/launcher-v2/src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test (lib + integration)
        if: steps.filter.outputs.launcher-v2 == 'true'
        working-directory: packages/launcher-v2/src-tauri
        # --test-threads=1 because snapshot/prune tests mutate the
        # PSYCHEROS_LAUNCHER_DATA_DIR env var. Env vars are
        # per-process, so parallel tests inside the same test binary
        # would race. Integration tests in `tests/` each get their
        # own process and aren't affected.
        run: cargo test --all-targets -- --test-threads=1

      - name: smoke (--smoke gate)
        if: steps.filter.outputs.launcher-v2 == 'true'
        working-directory: packages/launcher-v2/src-tauri
        run: cargo run --bin psycheros-launcher -- --smoke

      - name: cargo clippy (webdriver feature)
        if: steps.filter.outputs.launcher-v2 == 'true'
        working-directory: packages/launcher-v2/src-tauri
        # The webdriver feature pulls in a non-trivial transitive dep tree
        # (axum / hyper / tower for the WebDriver server). Lint it
        # separately so feature-conditional code can't slip past clippy.
        run: cargo clippy --features webdriver --all-targets -- -D warnings

      - name: Set up Node (for E2E)
        if: steps.filter.outputs.launcher-v2 == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/launcher-v2/e2e/package-lock.json

      - name: Build launcher with webdriver feature
        if: steps.filter.outputs.launcher-v2 == 'true'
        working-directory: packages/launcher-v2/src-tauri
        run: cargo build --features webdriver

      - name: Install E2E deps
        if: steps.filter.outputs.launcher-v2 == 'true'
        working-directory: packages/launcher-v2/e2e
        run: npm ci

      - name: Run E2E tests
        if: steps.filter.outputs.launcher-v2 == 'true'
        working-directory: packages/launcher-v2/e2e
        run: npm test

  launcher-v2-windows:
    # Windows half of the launcher-v2 CI matrix. Runs the same
    # fmt / clippy / test / smoke gates as the macOS job. E2E
    # (wdio + tauri-plugin-webdriver) is intentionally omitted — the
    # E2E rig is currently macOS-only; bringing it to Windows is
    # follow-up work, not gate work.
    name: launcher-v2 cargo + smoke (Windows)
    if: github.repository == 'PsycherosAI/Psycheros'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check if launcher-v2 changed
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            launcher-v2:
              - 'packages/launcher-v2/**'
              - '.deno-version'

      - name: Set up Rust (MSVC toolchain)
        if: steps.filter.outputs.launcher-v2 == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
        # No `targets:` — windows-latest's default host triple is
        # x86_64-pc-windows-msvc, which is the only Windows target
        # we currently ship.

      - name: Set up Deno (for sidecar staging + integration test)
        if: steps.filter.outputs.launcher-v2 == 'true'
        uses: denoland/setup-deno@v2
        with:
          deno-version-file: .deno-version

      - name: Stage sidecar Deno + verify icons (setup.ps1)
        if: steps.filter.outputs.launcher-v2 == 'true'
        # PowerShell-equivalent of setup.sh. Stages the deno sidecar
        # into src-tauri/binaries/ and confirms committed icons are
        # present. The daemon-runner sidecar is a [[bin]] target
        # that cargo builds and Tauri auto-bundles — not staged
        # here.
        working-directory: packages/launcher-v2
        shell: pwsh
        run: ./scripts/setup.ps1

      - name: cargo fmt --check
        if: steps.filter.outputs.launcher-v2 == 'true'
        working-directory: packages/launcher-v2/src-tauri
        run: cargo fmt --check

      - name: cargo clippy
        if: steps.filter.outputs.launcher-v2 == 'true'
        working-directory: packages/launcher-v2/src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test (lib + integration)
        if: steps.filter.outputs.launcher-v2 == 'true'
        working-directory: packages/launcher-v2/src-tauri
        # --test-threads=1 because snapshot/prune tests mutate the
        # PSYCHEROS_LAUNCHER_DATA_DIR env var. Same reason as macOS.
        run: cargo test --all-targets -- --test-threads=1

      - name: smoke (--smoke gate)
        if: steps.filter.outputs.launcher-v2 == 'true'
        working-directory: packages/launcher-v2/src-tauri
        run: cargo run --bin psycheros-launcher -- --smoke

      - name: cargo clippy (webdriver feature)
        if: steps.filter.outputs.launcher-v2 == 'true'
        working-directory: packages/launcher-v2/src-tauri
        # Same rationale as the macOS job — the webdriver feature
        # pulls in axum/hyper/tower; keep feature-conditional code
        # from slipping past clippy. The E2E test rig itself isn't
        # run on Windows yet (see note at job top).
        run: cargo clippy --features webdriver --all-targets -- -D warnings
