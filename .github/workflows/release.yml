name: release

on:
  # Auto-fire on signed annotated *-v* tags. Each per-package job below
  # gates on its own prefix via `if: startsWith(github.ref_name, 'X-v')`,
  # so a single tag push runs exactly the matching job. workflow_dispatch
  # is kept for retries or out-of-band re-runs.
  #
  # Supported tag prefixes (independent version lineages):
  #   launcher-vX.Y.Z      → launcher bundle (zip + tarball) + raw install scripts
  #   entity-core-vX.Y.Z   → source tarball of packages/entity-core/
  #   entity-loom-vX.Y.Z   → source tarball of packages/entity-loom/
  #   psycheros-vX.Y.Z     → notes-only (container built by docker.yml)
  push:
    tags:
      - "launcher-v*"
      - "entity-core-v*"
      - "entity-loom-v*"
      - "psycheros-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  launcher:
    # v1 launcher. Excludes `launcher-v2-v*` because the glob
    # `launcher-v*` matches both lineages — the launcher-v2 job below
    # owns those tags. Once v2 reaches feature parity and v1 is
    # deleted (see packages/launcher-v2/docs/migration.md), this
    # workflow loses its v1 job; the trigger pattern can simplify
    # then.
    if: |
      github.repository == 'PsycherosAI/Psycheros' &&
      startsWith(github.ref_name, 'launcher-v') &&
      !startsWith(github.ref_name, 'launcher-v2-v')
    name: launcher
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Self-bootstrap the GH Release. With auto-fire on tag push, this job
      # runs immediately when the tag lands. Release notes come from
      # `packages/<pkg>/CHANGELOG.md` (Keep-a-Changelog format): the
      # extract script pulls the entry whose header is "## [<version>] ..."
      # and writes it to a tempfile passed via `--notes-file`. Falls back
      # to `--generate-notes` only when the CHANGELOG entry is missing /
      # empty (warning emitted).
      #
      # The v1 launcher used to own the repo-wide "Latest" badge.
      # Now deprecated in favor of launcher-v2 (macOS + Windows).
      # --latest=false so the v2 launcher's release wins the badge.
      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF: ${{ github.ref_name }}
        run: |
          if gh release view "$REF" >/dev/null 2>&1; then
            echo "Release $REF already exists; skipping create."
            exit 0
          fi
          PKG="${REF%-v*}"
          VERSION="${REF#${PKG}-v}"
          NOTES_FILE="$(mktemp)"
          if .github/scripts/extract-changelog-entry.sh "$PKG" "$VERSION" > "$NOTES_FILE"; then
            echo "Creating release from packages/${PKG}/CHANGELOG.md entry [$VERSION]."
            # Append the per-package "How to install" footer so visitors on
            # the release page can tell our scoped uploads apart from
            # GitHub's auto-attached full-monorepo source archives (which
            # are not real assets and cannot be disabled on free-tier
            # public repos).
            if [ -f ".github/release-footers/$PKG.md" ]; then
              printf "\n" >> "$NOTES_FILE"
              cat ".github/release-footers/$PKG.md" >> "$NOTES_FILE"
            fi
            gh release create "$REF" --title "$REF" --notes-file "$NOTES_FILE" --latest=false --verify-tag
          else
            echo "::warning::Falling back to --generate-notes for $REF (no CHANGELOG entry)."
            gh release create "$REF" --title "$REF" --generate-notes --latest=false --verify-tag
          fi

      - name: Stage launcher bundle
        env:
          REF: ${{ github.ref_name }}
        run: |
          # Ship the entire launcher package dir. dashboard.ts imports
          # ./version.ts which imports ./deno.json, so the runtime
          # entry-point needs all of its siblings — not just the boot
          # scripts. Matches the cp -a pattern used by entity-core and
          # entity-loom below.
          mkdir -p bundle
          cp -a packages/launcher "bundle/${REF}"
          ( cd bundle && tar -czf "${REF}.tar.gz" "${REF}" )
          ( cd bundle && zip -r   "${REF}.zip"    "${REF}" )

      - name: Set up Deno (for bundle smoke check)
        uses: denoland/setup-deno@v2
        with:
          deno-version-file: .deno-version

      - name: Smoke-check the bundled launcher
        env:
          REF: ${{ github.ref_name }}
        run: |
          # Type-check dashboard.ts against its siblings inside the staged
          # bundle. Catches the class of regression where a new runtime
          # dependency gets added to dashboard.ts but the bundle step
          # wasn't updated to ship it (the failure mode that caused
          # launcher-v0.2.0 to ship unrunnable: missing ./version.ts and
          # ./deno.json).
          deno check "bundle/${REF}/dashboard.ts"

      - name: Upload launcher assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF: ${{ github.ref_name }}
        run: |
          # Bundle .tar.gz / .zip are the canonical consumption path — they
          # contain the full launcher package and are runnable on extract.
          # Raw install.sh / install.ps1 are also attached for one-click
          # bootstrap: they clone the monorepo themselves and don't depend
          # on bundle siblings, so they work as standalone downloads.
          gh release upload "$REF" --clobber \
            "bundle/${REF}.tar.gz" \
            "bundle/${REF}.zip" \
            packages/launcher/install.sh \
            packages/launcher/install.ps1

  launcher-v2-macos:
    # v2 desktop launcher (Tauri 2 + Rust + HTML/JS) — macOS half.
    # Builds the .dmg + .app.tar.gz on macOS, uploads to the GitHub
    # release page. Pairs with `launcher-v2-windows` below to attach
    # both platforms' artifacts to the same release tag (the
    # "Ensure release exists" step is race-safe via `gh release
    # view` — whichever job arrives first creates the release; the
    # other skips). Build is unsigned; the .dmg requires
    # right-click → Open on Gatekeeper-protected macOS, documented
    # in the launcher-v2 README. Linux cross-platform stays deferred
    # until the systemd-user supervisor stub lands (see
    # packages/launcher-v2/docs/supervisors.md).
    if: github.repository == 'PsycherosAI/Psycheros' && startsWith(github.ref_name, 'launcher-v2-v')
    name: launcher-v2 (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF: ${{ github.ref_name }}
        run: |
          if gh release view "$REF" >/dev/null 2>&1; then
            echo "Release $REF already exists; skipping create."
            exit 0
          fi
          # Hardcoded "launcher-v2" — the generic ${REF%-v*} would
          # strip too aggressively on a `launcher-v2-vX.Y.Z` tag
          # (yielding "launcher" rather than "launcher-v2").
          PKG="launcher-v2"
          VERSION="${REF#${PKG}-v}"
          NOTES_FILE="$(mktemp)"
          if .github/scripts/extract-changelog-entry.sh "$PKG" "$VERSION" > "$NOTES_FILE"; then
            echo "Creating release from packages/${PKG}/CHANGELOG.md entry [$VERSION]."
            if [ -f ".github/release-footers/$PKG.md" ]; then
              printf "\n" >> "$NOTES_FILE"
              cat ".github/release-footers/$PKG.md" >> "$NOTES_FILE"
            fi
            # --latest: the v2 launcher owns the repo-wide "Latest"
            # badge now that it has shipped cross-platform support
            # (macOS + Windows). v1 is deprecated; its job uses
            # --latest=false.
            gh release create "$REF" --title "$REF" --notes-file "$NOTES_FILE" --latest --verify-tag
          else
            echo "::warning::Falling back to --generate-notes for $REF (no CHANGELOG entry)."
            gh release create "$REF" --title "$REF" --generate-notes --latest --verify-tag
          fi

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version-file: .deno-version

      - name: Stage sidecar Deno + icons
        working-directory: packages/launcher-v2
        run: ./scripts/setup.sh

      - name: Build .dmg + .app.tar.gz (aarch64)
        working-directory: packages/launcher-v2
        run: npx --yes @tauri-apps/cli@^2.0 build --target aarch64-apple-darwin

      - name: Upload launcher-v2 assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF: ${{ github.ref_name }}
        working-directory: packages/launcher-v2/src-tauri/target/aarch64-apple-darwin/release/bundle
        run: |
          # Tauri 2's bundle output layout:
          #   bundle/dmg/Psycheros_<version>_aarch64.dmg
          #   bundle/macos/Psycheros.app.tar.gz   (auto-updater fmt)
          # We upload both — the .dmg is the user-facing installer,
          # the .app.tar.gz feeds tauri-plugin-updater when the real
          # update pipeline lands (§5.19).
          ls -laR
          shopt -s nullglob
          for f in dmg/*.dmg macos/*.app.tar.gz; do
            echo "Uploading $f"
            gh release upload "$REF" --clobber "$f"
          done
          # Upload a stable-named duplicate so docs can link to
          # .../releases/latest/download/Psycheros-macOS-latest.dmg
          # without breaking on every version bump.
          dmg_file="$(compgen -G 'dmg/*.dmg' || true)"
          if [ -n "$dmg_file" ]; then
            cp "$dmg_file" Psycheros-macOS-latest.dmg
            gh release upload "$REF" --clobber Psycheros-macOS-latest.dmg
          fi

  launcher-v2-windows:
    # v2 desktop launcher — Windows half. Builds the .msi (WiX) +
    # standalone .exe (NSIS), uploads to the same GitHub release the
    # macOS job creates. Both jobs gate on `launcher-v2-v*` tags and
    # both run "Ensure release exists" defensively — whichever wins
    # the race creates the release, the other skips via
    # `gh release view`. Build is unsigned; users see SmartScreen on
    # first launch and click "More info → Run anyway." Documented in
    # the launcher-v2 README + docs/release.md.
    if: github.repository == 'PsycherosAI/Psycheros' && startsWith(github.ref_name, 'launcher-v2-v')
    needs: launcher-v2-macos
    name: launcher-v2 (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF: ${{ github.ref_name }}
        shell: bash
        run: |
          if gh release view "$REF" >/dev/null 2>&1; then
            echo "Release $REF already exists; skipping create."
            exit 0
          fi
          PKG="launcher-v2"
          VERSION="${REF#${PKG}-v}"
          NOTES_FILE="$(mktemp)"
          if .github/scripts/extract-changelog-entry.sh "$PKG" "$VERSION" > "$NOTES_FILE"; then
            echo "Creating release from packages/${PKG}/CHANGELOG.md entry [$VERSION]."
            if [ -f ".github/release-footers/$PKG.md" ]; then
              printf "\n" >> "$NOTES_FILE"
              cat ".github/release-footers/$PKG.md" >> "$NOTES_FILE"
            fi
            gh release create "$REF" --title "$REF" --notes-file "$NOTES_FILE" --latest --verify-tag
          else
            echo "::warning::Falling back to --generate-notes for $REF (no CHANGELOG entry)."
            gh release create "$REF" --title "$REF" --generate-notes --latest --verify-tag
          fi

      - name: Set up Rust (MSVC toolchain — required by Tauri/WiX on Windows)
        uses: dtolnay/rust-toolchain@stable
        # No `targets:` — windows-latest's default host triple is
        # x86_64-pc-windows-msvc which is what we want.

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version-file: .deno-version

      - name: Stage sidecar Deno + verify icons (setup.ps1)
        # The Windows equivalent of setup.sh — stages the deno
        # sidecar into src-tauri/binaries/ and confirms the
        # committed icons are present. The daemon-runner sidecar
        # isn't staged here; it's a [[bin]] target that Tauri's
        # bundler picks up from target/release/ automatically (see
        # packages/launcher-v2/CLAUDE.md "Don't add the
        # daemon-runner as an externalBin").
        working-directory: packages/launcher-v2
        shell: pwsh
        run: ./scripts/setup.ps1

      - name: Build .msi + .exe (x86_64-pc-windows-msvc)
        working-directory: packages/launcher-v2
        shell: pwsh
        run: npx --yes "@tauri-apps/cli@^2.0" build

      - name: Upload launcher-v2 Windows assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF: ${{ github.ref_name }}
        working-directory: packages/launcher-v2/src-tauri/target/release/bundle
        shell: bash
        run: |
          # Tauri 2's Windows bundle output layout:
          #   bundle/msi/Psycheros_<version>_x64_en-US.msi
          #   bundle/nsis/Psycheros_<version>_x64-setup.exe
          # We upload both — the .msi is the canonical Windows
          # installer (handles Start Menu shortcut + uninstaller
          # registration via WiX); the .exe is a standalone NSIS
          # bundle for users who prefer a single-file install.
          ls -laR
          shopt -s nullglob
          for f in msi/*.msi nsis/*.exe; do
            echo "Uploading $f"
            gh release upload "$REF" --clobber "$f"
          done
          # Upload stable-named duplicates so docs can link to
          # .../releases/latest/download/Psycheros-Windows-latest.msi
          # without breaking on every version bump.
          msi_file="$(compgen -G 'msi/*.msi' || true)"
          if [ -n "$msi_file" ]; then
            cp "$msi_file" Psycheros-Windows-latest.msi
            gh release upload "$REF" --clobber Psycheros-Windows-latest.msi
          fi

  entity-core:
    if: github.repository == 'PsycherosAI/Psycheros' && startsWith(github.ref_name, 'entity-core-v')
    name: entity-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF: ${{ github.ref_name }}
        run: |
          if gh release view "$REF" >/dev/null 2>&1; then
            echo "Release $REF already exists; skipping create."
            exit 0
          fi
          PKG="${REF%-v*}"
          VERSION="${REF#${PKG}-v}"
          NOTES_FILE="$(mktemp)"
          if .github/scripts/extract-changelog-entry.sh "$PKG" "$VERSION" > "$NOTES_FILE"; then
            echo "Creating release from packages/${PKG}/CHANGELOG.md entry [$VERSION]."
            # Append the per-package "How to install" footer so visitors on
            # the release page can tell our scoped uploads apart from
            # GitHub's auto-attached full-monorepo source archives (which
            # are not real assets and cannot be disabled on free-tier
            # public repos).
            if [ -f ".github/release-footers/$PKG.md" ]; then
              printf "\n" >> "$NOTES_FILE"
              cat ".github/release-footers/$PKG.md" >> "$NOTES_FILE"
            fi
            gh release create "$REF" --title "$REF" --notes-file "$NOTES_FILE" --latest=false --verify-tag
          else
            echo "::warning::Falling back to --generate-notes for $REF (no CHANGELOG entry)."
            gh release create "$REF" --title "$REF" --generate-notes --latest=false --verify-tag
          fi

      - name: Stage source tarball
        env:
          REF: ${{ github.ref_name }}
        run: |
          mkdir -p bundle
          cp -a packages/entity-core "bundle/${REF}"
          ( cd bundle && tar -czf "${REF}.tar.gz" "${REF}" )
          ( cd bundle && zip -r   "${REF}.zip"    "${REF}" )

      - name: Upload source asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF: ${{ github.ref_name }}
        run: |
          gh release upload "$REF" --clobber \
            "bundle/${REF}.tar.gz" \
            "bundle/${REF}.zip"

  entity-loom:
    if: github.repository == 'PsycherosAI/Psycheros' && startsWith(github.ref_name, 'entity-loom-v')
    name: entity-loom
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF: ${{ github.ref_name }}
        run: |
          if gh release view "$REF" >/dev/null 2>&1; then
            echo "Release $REF already exists; skipping create."
            exit 0
          fi
          PKG="${REF%-v*}"
          VERSION="${REF#${PKG}-v}"
          NOTES_FILE="$(mktemp)"
          if .github/scripts/extract-changelog-entry.sh "$PKG" "$VERSION" > "$NOTES_FILE"; then
            echo "Creating release from packages/${PKG}/CHANGELOG.md entry [$VERSION]."
            # Append the per-package "How to install" footer so visitors on
            # the release page can tell our scoped uploads apart from
            # GitHub's auto-attached full-monorepo source archives (which
            # are not real assets and cannot be disabled on free-tier
            # public repos).
            if [ -f ".github/release-footers/$PKG.md" ]; then
              printf "\n" >> "$NOTES_FILE"
              cat ".github/release-footers/$PKG.md" >> "$NOTES_FILE"
            fi
            gh release create "$REF" --title "$REF" --notes-file "$NOTES_FILE" --latest=false --verify-tag
          else
            echo "::warning::Falling back to --generate-notes for $REF (no CHANGELOG entry)."
            gh release create "$REF" --title "$REF" --generate-notes --latest=false --verify-tag
          fi

      - name: Stage source tarball
        env:
          REF: ${{ github.ref_name }}
        run: |
          mkdir -p bundle
          cp -a packages/entity-loom "bundle/${REF}"
          ( cd bundle && tar -czf "${REF}.tar.gz" "${REF}" )
          ( cd bundle && zip -r   "${REF}.zip"    "${REF}" )

      - name: Upload source asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF: ${{ github.ref_name }}
        run: |
          gh release upload "$REF" --clobber \
            "bundle/${REF}.tar.gz" \
            "bundle/${REF}.zip"

  psycheros-notes:
    if: github.repository == 'PsycherosAI/Psycheros' && startsWith(github.ref_name, 'psycheros-v')
    name: psycheros-notes
    runs-on: ubuntu-latest
    steps:
      # `gh release create --generate-notes --verify-tag` shells out to git
      # to enumerate commits + resolve the tag SHA. Without a checkout the
      # runner has no .git, and the create step fails with
      # "fatal: not a git repository". The other per-package jobs above all
      # checkout for asset staging, so this job was the only one that hit
      # the failure mode (first observed on psycheros-v0.1.2 auto-fire,
      # 2026-05-13). Keep this step even though the job uploads no assets.
      - uses: actions/checkout@v6

      # Launcher owns the repo-wide "Latest" badge — see RELEASES.md
      # "Latest badge policy". Strangers landing on /releases (and
      # `https://github.com/.../releases/latest/download/install.sh`) should be
      # guided to the installer, not to this notes-only harness release. The
      # actual image push is docker.yml's job; this workflow only ensures
      # the release page exists with curated notes. --latest=false below
      # keeps the badge on the launcher. No other per-package job runs
      # after launcher to avoid clobbering the Latest badge.
      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF: ${{ github.ref_name }}
        run: |
          if gh release view "$REF" >/dev/null 2>&1; then
            echo "Release $REF already exists; skipping create."
            exit 0
          fi
          PKG="${REF%-v*}"
          VERSION="${REF#${PKG}-v}"
          NOTES_FILE="$(mktemp)"
          if .github/scripts/extract-changelog-entry.sh "$PKG" "$VERSION" > "$NOTES_FILE"; then
            echo "Creating release from packages/${PKG}/CHANGELOG.md entry [$VERSION]."
            # Append the per-package "How to install" footer so visitors on
            # the release page can tell our scoped uploads apart from
            # GitHub's auto-attached full-monorepo source archives (which
            # are not real assets and cannot be disabled on free-tier
            # public repos).
            if [ -f ".github/release-footers/$PKG.md" ]; then
              printf "\n" >> "$NOTES_FILE"
              cat ".github/release-footers/$PKG.md" >> "$NOTES_FILE"
            fi
            gh release create "$REF" --title "$REF" --notes-file "$NOTES_FILE" --latest=false --verify-tag
          else
            echo "::warning::Falling back to --generate-notes for $REF (no CHANGELOG entry)."
            gh release create "$REF" --title "$REF" --generate-notes --latest=false --verify-tag
          fi

      - name: Emit notes-only notice
        env:
          REF: ${{ github.ref_name }}
        run: |
          echo "::notice::Tag '$REF' is the Psycheros harness lineage."
          echo "::notice::No release artifacts to attach — the container image is built + pushed by the docker workflow."
          echo "::notice::Release notes are derived from packages/psycheros/CHANGELOG.md; edit the CHANGELOG on staging for future releases. Manual override of this release's page is still possible via 'gh release edit \"$REF\" --notes-file ...'."
